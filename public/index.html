<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Butigers & Bloom POS</title>
  <meta name="description" content="Point-of-Sale" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <!-- ─── Header ─────────────────────────────────────────────── -->
  <header id="app-header">
    <div class="header-brand">
      <h1>Butigers & Bloom</h1>
    </div>
    <div class="pill-toggle" id="mode-toggle" data-active="cashier">
      <div class="pill-indicator"></div>
      <button class="pill-btn active" data-mode="cashier" id="pill-cashier">Cashier</button>
      <button class="pill-btn" data-mode="admin" id="pill-admin">Admin</button>
    </div>
  </header>

  <!-- ─── Main Content ───────────────────────────────────────── -->
  <main id="main-content">

    <!-- ═══ Cashier View ═══ -->
    <section id="cashier-view" class="view active">
      <!-- Product Grid -->
      <div class="cashier-products">
        <div class="cashier-products-header">
          <div class="search-box">
            <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input type="text" id="cashier-search" placeholder="Search products or scan barcode..." autocomplete="off" />
            <button class="search-clear" id="cashier-search-clear" type="button" aria-label="Clear search">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>
        </div>
        <div class="product-grid" id="product-grid">
          <!-- Rendered by JS -->
        </div>
      </div>

      <!-- Cart Panel -->
      <div class="cart-panel">
        <div class="cart-header">
          <h2>Current Sale</h2>
          <span class="cart-count" id="cart-count">0 items</span>
        </div>
        <div class="cart-items" id="cart-items">
          <!-- Rendered by JS -->
        </div>
        <div class="cart-footer" id="cart-footer">
          <div class="cart-total-row grand-total">
            <span class="label">Total</span>
            <span class="value" id="cart-total">₱0.00</span>
          </div>
          <button class="btn btn-primary btn-block" id="finalize-btn" disabled>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
            Finalize Sale
          </button>
          <button class="btn btn-secondary btn-block" id="clear-cart-btn" disabled>Clear Cart</button>
        </div>
      </div>
    </section>

    <!-- ═══ Admin View ═══ -->
    <section id="admin-view" class="view">
      <div class="admin-tabs">
        <button class="admin-tab active" data-panel="inventory-panel" id="tab-inventory">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: -2px; margin-right: 4px;"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 002 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0022 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
          Inventory
        </button>
        <button class="admin-tab" data-panel="history-panel" id="tab-history">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: -2px; margin-right: 4px;"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          History
        </button>
      </div>

      <!-- Inventory Panel -->
      <div class="admin-panel active" id="inventory-panel">
        <div class="inventory-toolbar">
          <div class="search-box" style="flex:1">
            <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input type="text" id="inventory-search" placeholder="Search inventory or scan barcode..." autocomplete="off" />
            <button class="search-clear" id="inventory-search-clear" type="button" aria-label="Clear search">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>
          <button class="btn btn-primary" id="add-product-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add Product
          </button>
        </div>
        <div class="inventory-table-wrap">
          <table class="data-table" id="inventory-table">
            <thead>
              <tr>
                <th>Product</th>
                <th>Variant</th>
                <th>Barcode</th>
                <th class="text-right">Stock</th>
                <th class="text-right">Cost</th>
                <th class="text-right">Sale Price</th>
                <th class="text-center">Status</th>
                <th class="text-center">Actions</th>
              </tr>
            </thead>
            <tbody id="inventory-tbody">
              <!-- Rendered by JS -->
            </tbody>
          </table>
        </div>
      </div>

      <!-- History Panel -->
      <div class="admin-panel" id="history-panel">
        <div class="history-list" id="history-list">
          <!-- Rendered by JS -->
        </div>
      </div>
    </section>

  </main>

  <!-- ─── Payment Modal ──────────────────────────────────────── -->
  <div class="modal-backdrop" id="payment-modal">
    <div class="modal">
      <div class="modal-header">
        <h2>Complete Payment</h2>
        <button class="modal-close" id="payment-close">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="payment-summary" id="payment-summary">
          <!-- Filled by JS -->
        </div>

        <div class="payment-input-group">
          <label>Cash Tendered</label>
          <div class="payment-amount-display" id="cash-display">₱0.00</div>
          <div class="change-display" id="change-display">
            <span class="label">Change</span>
            <span class="value">₱0.00</span>
          </div>
        </div>

        <div class="quick-amounts" id="quick-amounts">
          <button class="quick-amount-btn" data-amount="20">₱20</button>
          <button class="quick-amount-btn" data-amount="50">₱50</button>
          <button class="quick-amount-btn" data-amount="100">₱100</button>
          <button class="quick-amount-btn" data-amount="200">₱200</button>
          <button class="quick-amount-btn" data-amount="500">₱500</button>
          <button class="quick-amount-btn" data-amount="1000">₱1000</button>
        </div>

        <div class="numpad" id="numpad">
          <button class="numpad-btn" data-key="1">1</button>
          <button class="numpad-btn" data-key="2">2</button>
          <button class="numpad-btn" data-key="3">3</button>
          <button class="numpad-btn" data-key="4">4</button>
          <button class="numpad-btn" data-key="5">5</button>
          <button class="numpad-btn" data-key="6">6</button>
          <button class="numpad-btn" data-key="7">7</button>
          <button class="numpad-btn" data-key="8">8</button>
          <button class="numpad-btn" data-key="9">9</button>
          <button class="numpad-btn action" data-key="clear">C</button>
          <button class="numpad-btn" data-key="0">0</button>
          <button class="numpad-btn action" data-key="backspace">⌫</button>
          <button class="numpad-btn" data-key="." style="grid-column:1">.</button>
          <button class="numpad-btn action" data-key="exact" style="grid-column:2">Exact</button>
          <button class="numpad-btn confirm" data-key="confirm" id="confirm-payment-btn" style="grid-column:3" disabled>✓</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ─── Product Modal (Add/Edit) ───────────────────────────── -->
  <div class="modal-backdrop" id="product-modal">
    <div class="modal" style="max-width:500px">
      <div class="modal-header">
        <h2 id="product-modal-title">Add Product</h2>
        <button class="modal-close" id="product-modal-close">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="pf-name">Product Name</label>
          <input class="form-input" type="text" id="pf-name" placeholder="e.g. Liquid Soap" />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="pf-variant">Variant</label>
            <input class="form-input" type="text" id="pf-variant" placeholder="e.g. 500ml Bottle" />
          </div>
          <div class="form-group">
            <label for="pf-unit">Unit</label>
            <input class="form-input" type="text" id="pf-unit" placeholder="pcs, liters, etc." value="pcs" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="pf-cost">Cost Price (₱)</label>
            <input class="form-input" type="number" id="pf-cost" placeholder="0.00" step="0.01" min="0" />
          </div>
          <div class="form-group">
            <label for="pf-price">Sale Price (₱)</label>
            <input class="form-input" type="number" id="pf-price" placeholder="0.00" step="0.01" min="0" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="pf-stock">Stock</label>
            <input class="form-input" type="number" id="pf-stock" placeholder="0" step="1" min="0" />
          </div>
          <div class="form-group">
            <label for="pf-warning">Low Stock Warning</label>
            <input class="form-input" type="number" id="pf-warning" placeholder="0" step="1" min="0" />
          </div>
        </div>
        <div class="form-group">
          <label for="pf-barcode">Barcode</label>
          <input class="form-input" type="text" id="pf-barcode" placeholder="Scan or type barcode" />
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="product-cancel-btn" style="flex:1">Cancel</button>
        <button class="btn btn-primary" id="product-save-btn" style="flex:1">Save Product</button>
      </div>
    </div>
  </div>

  <!-- ─── Confirmation Modal ─────────────────────────────────── -->
  <div class="modal-backdrop" id="confirm-modal">
    <div class="modal" style="max-width:360px">
      <div class="modal-header">
        <h2 id="confirm-modal-title">Confirm</h2>
        <button class="modal-close" id="confirm-modal-close">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <p id="confirm-modal-message">Are you sure?</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="confirm-no-btn" style="flex:1">Cancel</button>
        <button class="btn btn-danger" id="confirm-yes-btn" style="flex:1">Confirm</button>
      </div>
    </div>
  </div>

  <!-- ─── Toast Container ────────────────────────────────────── -->
  <div class="toast-container" id="toast-container"></div>

  <script src="/app.js"></script>
</body>
</html>
