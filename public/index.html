<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Liquid Soap POS Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-600 via-cyan-600 to-slate-900 text-slate-900">
  <div class="flex min-h-screen items-center justify-center px-4 py-8">
    <div class="w-full max-w-md rounded-3xl bg-white/95 p-8 shadow-2xl ring-1 ring-slate-200 backdrop-blur-md sm:px-10">
      <div class="mb-8 text-center">
        <div class="inline-flex h-16 w-16 items-center justify-center rounded-3xl bg-blue-600 text-white shadow-lg shadow-blue-200/20">
          <span class="text-2xl font-bold">LS</span>
        </div>
        <h1 class="mt-5 text-3xl font-semibold tracking-tight text-slate-900">Liquid Soap Point of Sale</h1>
        <p class="mt-2 text-sm text-slate-500">Login as Admin or Store Watcher. Mobile-ready and localStorage powered.</p>
      </div>

      <form id="login-form" class="space-y-5">
        <div>
          <label for="username" class="text-sm font-medium text-slate-700">Username</label>
          <input id="username" name="username" type="text" autocomplete="username" required class="mt-2 block w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm text-slate-900 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-200" placeholder="admin or store" />
        </div>
        <div>
          <label for="password" class="text-sm font-medium text-slate-700">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required class="mt-2 block w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm text-slate-900 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-200" placeholder="123" />
        </div>
        <button type="submit" class="w-full rounded-2xl bg-blue-600 px-4 py-3 text-sm font-semibold text-white transition hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-400">Login</button>
      </form>

      <div class="mt-6 rounded-2xl bg-slate-50 p-4 text-sm text-slate-600 ring-1 ring-slate-200">
        <p class="font-semibold text-slate-900">Demo accounts</p>
        <p>Admin: <span class="font-medium">admin / 123</span></p>
        <p>Store: <span class="font-medium">store / 123</span></p>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
  <script>
    document.getElementById('login-form').addEventListener('submit', function (event) {
      event.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const user = window.loginUser(username, password);
      if (!user) {
        alert('Invalid credentials. Please enter admin/123 or store/123.');
        return;
      }
      window.redirectAfterLogin(user);
    });
  </script>
</body>
</html>
