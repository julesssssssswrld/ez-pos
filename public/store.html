<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Liquid Soap Storefront</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: 'Plus Jakarta Sans', ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    button,
    input,
    textarea,
    select {
      font-family: 'Plus Jakarta Sans', ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .store-name {
      font-family: 'DM Serif Display', serif;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">
  <div class="bg-white border-b border-slate-200 shadow-sm">
    <div class="mx-auto flex max-w-6xl flex-col gap-4 px-4 py-4 sm:flex-row sm:items-center sm:justify-between">
      <div>
        <p class="text-xs uppercase tracking-[0.3em] text-slate-400">Liquid Soap POS</p>
        <h1 class="store-name text-4xl sm:text-5xl font-medium italic text-slate-900">Butigers & Bloom</h1>
      </div>
      <div class="flex flex-col gap-3 sm:flex-row sm:items-center">
        <div id="role-badge" class="rounded-2xl bg-slate-100 px-4 py-2 text-sm font-medium text-slate-700">Cashier</div>
        <button id="logout-btn" class="rounded-2xl bg-blue-600 px-4 py-2 text-sm font-semibold text-white hover:bg-blue-700">Logout</button>
      </div>
    </div>
  </div>

  <main class="mx-auto max-w-6xl px-4 py-6">
    <section id="product-grid" class="grid gap-4 sm:grid-cols-2 xl:grid-cols-3"></section>
  </main>

  <div id="payment-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center bg-slate-900/50 px-4 py-6">
    <div class="w-full max-w-lg rounded-3xl bg-white p-6 shadow-2xl">
      <div class="mb-5 flex items-center justify-between">
        <div>
          <p class="text-sm uppercase tracking-[0.3em] text-slate-400">Payment</p>
          <h2 id="modal-product-title" class="text-2xl font-semibold text-slate-900">Liquid Soap Product</h2>
        </div>
        <button id="modal-close" class="rounded-full bg-slate-100 px-3 py-2 text-slate-600 hover:bg-slate-200">Close</button>
      </div>
      <div class="space-y-4">
        <div class="rounded-3xl border border-slate-200 bg-slate-50 p-4">
          <p class="text-sm text-slate-500">Total Price</p>
          <p id="modal-total-price" class="mt-2 text-3xl font-semibold text-slate-900">₱0.00</p>
        </div>
        <div>
          <label for="cash-received" class="text-sm font-medium text-slate-700">Cash Received</label>
          <input id="cash-received" type="number" min="0" step="0.01" class="mt-2 block w-full rounded-2xl border border-slate-300 bg-white px-4 py-3 text-sm text-slate-900 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-200" placeholder="Enter cash amount" />
        </div>
        <div class="rounded-3xl border border-slate-200 bg-slate-50 p-4">
          <p class="text-sm text-slate-500">Change (Sukli)</p>
          <p id="modal-change" class="mt-2 text-2xl font-semibold text-slate-900">₱0.00</p>
        </div>
        <button id="confirm-sale" class="w-full rounded-2xl bg-blue-600 px-4 py-3 text-sm font-semibold text-white hover:bg-blue-700">Confirm Sale</button>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
